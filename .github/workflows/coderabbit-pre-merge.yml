name: CodeRabbit Pre-Merge Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coderabbit-review:
    runs-on: ubuntu-latest
    # Only run on PRs opened by agent bot accounts, not humans
    if: |
      contains(fromJSON('["codex-bot", "opencode-bot", "github-actions[bot]"]'), github.actor)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CodeRabbit CLI
        run: npm install -g @coderabbit/cli

      - name: Authenticate CodeRabbit
        run: coderabbit auth login --api-key ${{ secrets.CODERABBIT_API_KEY }}

      - name: Run review on committed changes
        run: coderabbit review --plain --type committed

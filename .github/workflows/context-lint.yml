name: Context Lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run context lint
        run: bash lint-context.sh

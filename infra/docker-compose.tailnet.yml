services:
  web-tailnet:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: cacheflow-web-tailnet
    restart: always
    ports:
      - "0.0.0.0:3011:3010"
    environment:
      - NEXT_PUBLIC_API_URL=https://instance-20260108-1933.tailc5ab10.ts.net:8443
      - PORT=3010
    depends_on:
      - api
    networks:
      - cacheflow
    mem_limit: 512m

networks:
  cacheflow:
    external: true
    name: infra_cacheflow

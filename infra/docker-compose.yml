services:
  postgres:
    image: postgres:17-alpine
    container_name: cacheflow-postgres
    environment:
      POSTGRES_DB: cacheflow
      POSTGRES_USER: cacheflow
      POSTGRES_PASSWORD: changeme123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cacheflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

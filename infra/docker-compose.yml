services:

  postgres:
    image: postgres:17-alpine
    container_name: cacheflow-postgres
    environment:
      POSTGRES_DB: cacheflow
      POSTGRES_USER: cacheflow
      POSTGRES_PASSWORD: changeme123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cacheflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cacheflow

  api:
    build:
      context: /opt/cacheflow/api
      dockerfile: Dockerfile
    container_name: cacheflow-api
    env_file: /opt/cacheflow/.env
    ports:
      - "8100:8100"
    volumes:
      - /mnt/local:/mnt/local
      - /mnt/pool:/mnt/pool:ro
      - /opt/cacheflow/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cacheflow

networks:
  cacheflow:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cacheflow-postgres
    environment:
      POSTGRES_DB: cacheflow
      POSTGRES_USER: cacheflow
      POSTGRES_PASSWORD: changeme123
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - /srv/docker/apps/cacheflow/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cacheflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cacheflow
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    container_name: cacheflow-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    restart: always
    networks:
      - cacheflow
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: cacheflow-api
    user: "1002:1002"
    env_file: ../.env
    ports:
      - "127.0.0.1:8100:8100"
    volumes:
      - /mnt/local:/mnt/local
      - /mnt/pool:/mnt/pool:ro
      - /srv/docker/apps/cacheflow/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - cacheflow
    mem_limit: 1g

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: cacheflow-worker
    env_file: ../.env
    command: ["sh", "-c", "mkdir -p /app/logs && node sync-worker.js"]
    volumes:
      - /mnt/local:/mnt/local
      - /srv/docker/apps/cacheflow/logs:/app/logs
      - /home/sanjay/.config/rclone/rclone.conf:/root/.config/rclone/rclone.conf:ro
      - /home/sanjay/.ssh/id_ed25519:/home/sanjay/.ssh/id_ed25519:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - cacheflow
    mem_limit: 512m

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://cacheflow-api.goels.in}
    container_name: cacheflow-web
    restart: always
    ports:
      - "0.0.0.0:3010:3010"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://cacheflow-api.goels.in}
      - PORT=3010
      - HOSTNAME=0.0.0.0
    depends_on:
      - api
    networks:
      - cacheflow
    mem_limit: 512m

  webdav:
    image: rclone/rclone:latest
    container_name: cacheflow-webdav
    restart: always
    user: "1002:1002"
    mem_limit: 256m
    command: >
      serve webdav /data
      --addr 0.0.0.0:8180
      --vfs-cache-mode off
      --log-level INFO
      --htpasswd /config/webdav.htpasswd
    volumes:
      - /mnt/pool:/data:ro
      - /srv/docker/apps/cacheflow/webdav:/config
    ports:
      - "127.0.0.1:8180:8180"
    networks:
      - cacheflow

networks:
  cacheflow:
    driver: bridge

volumes: {}

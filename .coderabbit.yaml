language: "en-US"

reviews:
  profile: "chill"
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  path_filters:
    - "!**/.next/**"
    - "!**/node_modules/**"
    - "!**/coverage/**"
    - "!**/playwright-report/**"
    - "!**/test-results/**"
    - "!**/monitoring/*.yaml"

  auto_review:
    enabled: true
    drafts: false
